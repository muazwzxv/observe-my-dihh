services:
  mysql:
    image: mysql:8.0
    container_name: otel_api_demo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: otel_api_demo_db
      MYSQL_USER: otel_api_demo_user
      MYSQL_PASSWORD: otel_api_demo_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: otel_api_demo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: otel_api_demo-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: otel_api_demo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ponytail: replaced by grafana/otel-lgtm which bundles its own collector
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   container_name: otel_api_demo-otel-collector
  #   command: ["--config=/etc/otel-collector-config.yaml"]
  #   volumes:
  #     - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
  #   ports:
  #     - "4317:4317"
  #     - "4318:4318"
  #     - "8889:8889"

  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: otel_api_demo-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - lgtm_data:/data
    environment:
      - ENABLE_LOGS_ALL=true

volumes:
  mysql_data:
  redis_data:
  lgtm_data:
